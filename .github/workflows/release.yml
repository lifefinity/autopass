name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.3"

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X github.com/lifefinity/autopass/cmd.Version=${VERSION}"

          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/autopass-linux-amd64 .
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/autopass-linux-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/autopass-darwin-amd64 .
          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/autopass-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/autopass-windows-amd64.exe .

          cd dist && sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
