security:
  - changed-files:
      - any-glob-to-any-file:
          - "internal/crypto/**"
          - "SECURITY.md"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
          - "README.md"
          - "*.md"

ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - "Makefile"

engine:
  - changed-files:
      - any-glob-to-any-file:
          - "internal/engine/**"

commands:
  - changed-files:
      - any-glob-to-any-file:
          - "cmd/**"

tests:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*_test.go"
          - "testdata/**"
