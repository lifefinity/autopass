name: Bug Report
description: Report a bug
labels: [bug]
body:
  - type: textarea
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `autopass add ...`
        2. ...
    validations:
      required: true
  - type: input
    attributes:
      label: Version
      placeholder: "autopass version (e.g. v0.3.0)"
    validations:
      required: true
  - type: dropdown
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true
