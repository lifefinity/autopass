version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: autopass
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/lifefinity/autopass/cmd.Version={{.Version}}
      - -X github.com/lifefinity/autopass/cmd.Commit={{.ShortCommit}}
      - -X github.com/lifefinity/autopass/cmd.BuildDate={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - repository:
      owner: lifefinity
      name: homebrew-tap
    homepage: "https://github.com/lifefinity/autopass"
    description: "Encrypted expect in one binary - auto-answer interactive prompts"
    license: "MIT"
    install: |
      bin.install "autopass"
    test: |
      assert_match version.to_s, shell_output("#{bin}/autopass version")
