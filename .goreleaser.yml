version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: passauto
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/lifefinity/passauto/cmd.Version={{.Version}}
      - -X github.com/lifefinity/passauto/cmd.Commit={{.ShortCommit}}
      - -X github.com/lifefinity/passauto/cmd.BuildDate={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
